<!DOCTYPE html>
<html>
<head>
    <title>GrowSync - Smart Irrigation Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            margin:0;
            font-family:'Segoe UI',sans-serif;
            background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
            color:white;
            text-align:center;
        }

        h1{
            margin-top:25px;
            font-size:52px;
            letter-spacing:1px;
            background:linear-gradient(to right,#16a34a,#4ade80);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        h2{
            color:#dbeafe;
            margin-bottom:10px;
        }

        h3{
            color:#cbd5f5;
            margin-bottom:12px;
        }

        .container{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:22px;
            max-width:1100px;
            margin:auto;
            padding:25px;
        }

        .full{
            grid-column:1 / span 2;
        }

        .card{
            backdrop-filter:blur(12px);
            background:rgba(255,255,255,0.08);
            border-radius:18px;
            padding:24px;
            box-shadow:0 10px 30px rgba(0,0,0,0.45);
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .value{
            font-size:38px;
            font-weight:bold;
            margin-top:10px;
        }

        .status-on{
            color:#22c55e;
            animation:pulse 1s infinite;
        }

        .status-off{
            color:#ef4444;
        }

        .moisture-low{
            color:#ef4444;
        }

        .moisture-medium{
            color:#facc15;
        }

        .moisture-good{
            color:#22c55e;
        }

        canvas{
            width:100% !important;
            max-height:420px;
            margin-top:20px;
        }

        @keyframes pulse{
            0%{transform:scale(1);}
            50%{transform:scale(1.08);}
            100%{transform:scale(1);}
        }

        @media(max-width:768px){
            .container{
                grid-template-columns:1fr;
            }

            .full{
                grid-column:auto;
            }

            h1{
                font-size:40px;
            }

            .value{
                font-size:30px;
            }
        }
    </style>
</head>

<body>

    <h1>GrowSync</h1>
    <h2>Hybrid Smart Irrigation System</h2>

    <div class="container">

        <div class="card full">
            <h3>Current Time</h3>
            <div class="value" id="currentTime">--</div>
        </div>

        <div class="card">
            <h3>Soil Moisture</h3>
            <div class="value" id="moisture">--%</div>
        </div>

        <div class="card">
            <h3>Pump Status</h3>
            <div class="value status-off" id="pumpStatus">OFF</div>
        </div>

        <div class="card">
            <h3>Last Watering</h3>
            <div class="value" id="lastWatering">--</div>
        </div>

        <div class="card">
            <h3>Next Watering</h3>
            <div class="value" id="nextWatering">Tomorrow 06:00 AM</div>
        </div>

        <div class="card full">
            <h3>Moisture Graph</h3>
            <canvas id="moistureChart"></canvas>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        function getNextWateringTime() {
            let now = new Date();
            let hour = now.getHours();

            if(hour < 6)
                return "06:00 AM";
            else if(hour < 17)
                return "05:00 PM";
            else
                return "Tomorrow 06:00 AM";
        }

        // Graph data
        let moistureHistory = [55, 60, 58, 62, 57, 49, 63, 44];
        let labels = ["t1", "t2", "t3", "t4", "t5", "1:13:26 PM", "1:13:28 PM", "1:13:30 PM"];

        const ctx = document.getElementById('moistureChart').getContext('2d');

        const moistureChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Soil Moisture %',
                    data: moistureHistory,
                    borderColor: '#39e27d',
                    backgroundColor: 'transparent',
                    borderWidth: 4,
                    tension: 0.4,
                    pointRadius: 5,
                    pointBackgroundColor: '#39e27d'
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        labels: {
                            color: 'white'
                        }
                    }
                },
                scales: {
                    x: {
                        ticks: {
                            color: 'white'
                        },
                        grid: {
                            color: 'rgba(255,255,255,0.05)'
                        }
                    },
                    y: {
                        min: 0,
                        max: 100,
                        ticks: {
                            color: 'white'
                        },
                        grid: {
                            color: 'rgba(255,255,255,0.05)'
                        }
                    }
                }
            }
        });

        async function updateDashboard() {
            try {
                let response = await fetch("/data");
                let data = await response.json();

                let moisture = data.moisture;
                let pump = data.pump;

                // Moisture Percentage
                let moistureEl = document.getElementById("moisture");
                moistureEl.innerHTML = moisture + "%";

                if(moisture < 45){
                    moistureEl.className = "value moisture-low";
                }
                else if(moisture < 70){
                    moistureEl.className = "value moisture-medium";
                }
                else{
                    moistureEl.className = "value moisture-good";
                }

                // Pump Status
                let pumpEl = document.getElementById("pumpStatus");
                pumpEl.innerHTML = pump;

                if(pump === "ON"){
                    pumpEl.className = "value status-on";
                }
                else{
                    pumpEl.className = "value status-off";
                }

                // Times
                document.getElementById("lastWatering").innerHTML = data.last;
                document.getElementById("nextWatering").innerHTML = getNextWateringTime();
                document.getElementById("currentTime").innerHTML = new Date().toLocaleTimeString();

                // Update Graph
                moistureHistory.push(moisture);

                let now = new Date().toLocaleTimeString();

                labels.push(now);

                if(moistureHistory.length > 8){
                    moistureHistory.shift();
                    labels.shift();
                }

                moistureChart.data.labels = labels;
                moistureChart.data.datasets[0].data = moistureHistory;
                moistureChart.update();

            } catch(error) {
                console.log("Server not responding");
            }
        }

        setInterval(updateDashboard, 2000);
        updateDashboard();
    </script>

</body>
</html>
